<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASI ES LA BIRRA - Tres Arroyos</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif}
body {background:#0a0a0a; color:#fff}
header {background:#1a1a1a; padding:15px; text-align:center; position:sticky; top:0; z-index:100}

h1 {font-size:22px; color:#25D366}

.filtros {display:flex; gap:8px; padding:12px; overflow-x:auto; background:#151515; align-items:center}
.filter-btn {padding:8px 14px; border:none; border-radius:20px; background:#2a2a2a; color:#fff; cursor:pointer; white-space:nowrap; font-size:14px}
.filter-btn.active {background:#25D366; color:white}

#btn-carrito-filtros {margin-left:auto; background:#ff9800; color:#fff; padding:8px 14px; border:none; border-radius:20px; font-weight:bold; cursor:pointer; font-size:14px}
#btn-carrito-filtros:hover {background:#e68900}

.container {padding:12px; max-width:1200px; margin:auto}

.grid-promos {display:grid; grid-template-columns:repeat(2, 1fr); gap:8px; margin:12px 0}

.promo-item {
  border:1px solid #333; border-radius:8px; overflow:hidden; background:#2a2a2a; display:flex; flex-direction:column;
}

.promo-item img {width:100%; height:110px; object-fit:cover; display:block; background:#1a1a1a; cursor:pointer}

.promo-nombre {
  font-size:13px; font-weight:600; padding:6px 4px; color:#fff; text-align:center; min-height:32px;
  display:flex; align-items:center; justify-content:center; line-height:1.2;
}

.promo-precio {
  font-size:15px; font-weight:bold; color:#25D366; text-align:center; padding-bottom:4px;
}

.btn-group {display:flex; gap:4px; margin-top:auto}

.btn-pedir {
  flex:1; background:#25D366; color:white; border:none; padding:8px; font-size:12px; font-weight:bold; cursor:pointer; border-radius:0 0 0 8px;
}

.btn-carrito {
  flex:1; background:#ff9800; color:white; border:none; padding:8px; font-size:12px; font-weight:bold; cursor:pointer; border-radius:0 0 8px 0;
}

.btn-pedir:hover {background:#1ebc57;}
.btn-carrito:hover {background:#e68900;}
.btn-carrito:active {transform:scale(0.95);}

.modal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center}
.modal-content {background:#1a1a1a; border-radius:15px; max-width:500px; width:90%; max-height:85vh; overflow-y:auto; border:1px solid #333}
.modal-header {display:flex; gap:12px; padding:15px; border-bottom:1px solid #333; position:relative}
.modal-header img {width:70px; height:70px; border-radius:10px; object-fit:cover}
.modal-close {position:absolute; top:12px; right:16px; font-size:28px; cursor:pointer; color:#aaa}
.modal-pedido {padding:20px; display:block}
.modal-pedido h3 {color:#25D366; margin-bottom:15px}
.modal-pedido input, .modal-pedido textarea {width:100%; padding:10px; margin:8px 0; border-radius:8px; border:1px solid #333; background:#2a2a2a; color:#fff}
.btn-whatsapp {background:#25D366; border:none; color:#000; padding:12px; border-radius:8px; width:100%; font-weight:bold; font-size:16px; cursor:pointer; margin-top:10px}

#items-carrito-modal {max-height:250px; overflow-y:auto; margin:10px 0}
#items-carrito-modal p {margin:8px 0; padding-bottom:8px; border-bottom:1px solid #333; font-size:14px}

.btn-vaciar {background:#dc3545; border:none; color:white; padding:8px 12px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:bold; margin-bottom:10px}
.btn-vaciar:hover {background:#c82333}

.opcion-envio {display:flex; gap:10px; margin:15px 0; padding:12px; background:#2a2a2a; border-radius:8px}
.opcion-envio label {flex:1; cursor:pointer; padding:10px; border:2px solid #444; border-radius:8px; text-align:center; transition:all 0.2s}
.opcion-envio input[type="radio"] {display:none}
.opcion-envio input[type="radio"]:checked + label {border-color:#25D366; background:#1a3d2a}

/* LIGHTBOX */
.lightbox {
  display: none;
  position: fixed;
  z-index: 9999;
  padding-top: 50px;
  left: 0; top: 0;
  width: 100%; height: 100%;
  overflow: auto;
  background: rgba(0,0,0,0.9);
}
.lightbox img {
  margin: auto;
  display: block;
  max-width: 90%;
  max-height: 85vh;
  border-radius: 8px;
}
.lightbox .close {
  position: absolute;
  top: 20px; right: 40px;
  color: #fff; font-size: 40px;
  font-weight: bold;
  cursor: pointer;
}
.lightbox .close:hover { color: #ccc; }

.seccion-titulo {font-size:18px; color:#25D366; margin:20px 0 8px 0; padding-left:4px}
</style>
</head>
<body>

<div class="header">
  <h1>ASI ES LA BIRRA</h1>
</div>

<div class="filtros">
  <button class="filter-btn active" onclick="filtrarCategoria('todos', this)">Todas</button>
  <button class="filter-btn" onclick="filtrarCategoria('kiosco', this)">Kiosco</button>
  <button class="filter-btn" onclick="filtrarCategoria('bebidas', this)">Bebidas</button>
  <button class="filter-btn" onclick="filtrarCategoria('cigarrillos', this)">Cigarrillos</button>
  <button class="filter-btn" onclick="filtrarCategoria('combos', this)">Combos</button>
  
  <button id="btn-carrito-filtros" onclick="abrirCarritoModal()">🛒 Carrito <span id="contador-carrito">(0)</span></button>
</div>

<div class="container">

<!-- SECCION KIOSCO -->
<div class="seccion-titulo" id="kiosco">🏪 Kiosco</div>
<div class="grid-promos" data-categoria="kiosco">
  <div class="promo-item">
    <img src="https://images.unsplash.com/photo-1582058091505-f87a2e55a40f?w=200&h=110&fit=crop">
    <div class="promo-nombre">Golosinas Surtidas x10</div>
    <div class="promo-precio">$1800</div>
    <div class="btn-group">
      <button class="btn-pedir" onclick="abrirPedido('Golosinas Surtidas x10',1800)">Pedir $1.800</button>
      <button class="btn-carrito" data-promo="Golosinas Surtidas x10" data-precio="1800">+ Carrito</button>
    </div>
  </div>
</div>

<!-- SECCION BEBIDAS -->
<div class="seccion-titulo" id="bebidas">🍺 Bebidas</div>
<div class="grid-promos" data-categoria="bebidas">
  <div class="promo-item">
    <img src="https://images.unsplash.com/photo-1608270586620-248524c67de9?w=200&h=110&fit=crop">
    <div class="promo-nombre">Cerveza Artesanal 1L</div>
    <div class="promo-precio">$3800</div>
    <div class="btn-group">
      <button class="btn-pedir" onclick="abrirPedido('Cerveza Artesanal 1L',3800)">Pedir $3.800</button>
      <button class="btn-carrito" data-promo="Cerveza Artesanal 1L" data-precio="3800">+ Carrito</button>
    </div>
  </div>
</div>

<!-- SECCION CIGARRILLOS -->
<div class="seccion-titulo" id="cigarrillos">🚬 Cigarrillos</div>
<div class="grid-promos" data-categoria="cigarrillos">
  <div class="promo-item">
    <img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=200&h=110&fit=crop">
    <div class="promo-nombre">Cigarrillos + Encendedor</div>
    <div class="promo-precio">$1600</div>
    <div class="btn-group">
      <button class="btn-pedir" onclick="abrirPedido('Cigarrillos + Encendedor',1600)">Pedir $1.600</button>
      <button class="btn-carrito" data-promo="Cigarrillos + Encendedor" data-precio="1600">+ Carrito</button>
    </div>
  </div>
</div>

<!-- SECCION COMBOS -->
<div class="seccion-titulo" id="combos">🎯 Combos</div>
<div class="grid-promos" data-categoria="combos">
  <div class="promo-item">
    <img src="https://images.unsplash.com/photo-1485809052867-1993bd6afa1f?w=200&h=110&fit=crop">
    <div class="promo-nombre">Combo Previa: Birra + Snack</div>
    <div class="promo-precio">$5500</div>
    <div class="btn-group">
      <button class="btn-pedir" onclick="abrirPedido('Combo Previa: Birra + Snack',5500)">Pedir $5.500</button>
      <button class="btn-carrito" data-promo="Combo Previa: Birra + Snack" data-precio="5500">+ Carrito</button>
    </div>
  </div>
</div>

</div>

<!-- MODAL CARRITO/PEDIDO -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <img id="modal-img" src="https://cdn-icons-png.flaticon.com/512/3144/3144456.png" alt="">
      <div style="flex:1">
        <h3 id="modal-nombre">Tu Pedido</h3>
      </div>
      <span class="modal-close" onclick="cerrarModal()">&times;</span>
    </div>
    
    <div class="modal-pedido" id="modal-pedido">
      <h3 id="titulo-modal">Confirmar Pedido 📱</h3>
      <div id="resumen-pedido"></div>
      
      <div id="opcion-envio-container"></div>

      <div style="margin:15px 0; padding:12px; background:#2a2a2a; border-radius:8px">
        <p style="font-weight:bold; margin-bottom:8px; color:#25D366">Método de pago *</p>
        <div class="opcion-envio">
          <input type="radio" id="pago-efectivo" name="pago" value="Efectivo" checked>
          <label for="pago-efectivo">💵 Efectivo<br><small>Contra entrega</small></label>
          
          <input type="radio" id="pago-transfer" name="pago" value="Transferencia">
          <label for="pago-transfer">🏦 Transferencia<br><small>Te pasamos CBU</small></label>
          
          <input type="radio" id="pago-mp" name="pago" value="Mercado Pago">
          <label for="pago-mp">📱 Mercado Pago<br><small>Te mandamos link</small></label>
        </div>
      </div>

      <div style="margin:15px 0; padding:12px; background:#2a2a2a; border-radius:8px">
        <p style="font-size:18px; margin:10px 0; text-align:center">
          <span id="texto-envio">Envío a domicilio: <b style="color:#25D366">$2.000</b></span><br>
          Total: <b id="pedido-total" style="color:#25D366; font-size:22px"></b>
        </p>
      </div>

      <input type="text" id="pedido-nombre" placeholder="Tu nombre *" required>
      <input type="tel" id="pedido-tel" placeholder="Tu teléfono *" required>
      <input type="text" id="pedido-direccion" placeholder="Dirección para envío *" required>
      <textarea id="pedido-nota" placeholder="Aclaraciones: piso, timbre, etc" rows="3"></textarea>
      
      <div style="display:flex; gap:8px; margin-top:10px">
        <button onclick="cerrarModal()" style="flex:1; padding:12px; border:none; border-radius:8px; background:#444; color:#fff; cursor:pointer">Volver</button>
        <button class="btn-whatsapp" onclick="enviarWhatsApp()">Enviar por WhatsApp</button>
      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">
  <span class="close">&times;</span>
  <img id="lightbox-img">
</div>

</body>
<script>
const NUMERO = "5492983389710";
let pedidoActual = {};
let carrito = [];
let tipoEntrega = 'envio';

document.addEventListener('DOMContentLoaded', () => {
  const guardado = localStorage.getItem('carritoASI');
  if(guardado) {
    carrito = JSON.parse(guardado);
    actualizarContadorCarrito();
  }

  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  const closeBtn = document.querySelector('.lightbox .close');

  document.querySelectorAll('.promo-item img').forEach(img => {
    img.onclick = (e) => {
      e.stopPropagation();
      lightbox.style.display = 'block';
      lightboxImg.src = img.src;
    }
  });

  closeBtn.onclick = () => lightbox.style.display = 'none';
  lightbox.onclick = (e) => { if(e.target == lightbox) lightbox.style.display = 'none'; }
  document.addEventListener('keydown', (e) => { if(e.key === 'Escape') lightbox.style.display = 'none'; });
});

function guardarCarrito() {
  localStorage.setItem('carritoASI', JSON.stringify(carrito));
}

document.addEventListener('click', e => {
  if(e.target.classList.contains('btn-carrito')) {
    const item = {
      promo: e.target.dataset.promo, 
      precio: parseInt(e.target.dataset.precio)
    };
    carrito.push(item);
    guardarCarrito();
    actualizarContadorCarrito();
    e.target.textContent = "✓ Agregado";
    setTimeout(() => e.target.textContent = "+ Carrito", 1000);
  }
});

function actualizarContadorCarrito() {
  document.getElementById('contador-carrito').textContent = `(${carrito.length})`;
}

function vaciarCarrito() {
  if(confirm('¿Seguro que querés vaciar el carrito?')) {
    carrito = [];
    guardarCarrito();
    actualizarContadorCarrito();
    cerrarModal();
  }
}

function abrirCarritoModal() {
  if(carrito.length === 0) {
    alert("El carrito está vacío. Agregá promos desde los botones + Carrito");
    return;
  }
  
  tipoEntrega = 'envio';
  pedidoActual = {tipo: 'carrito'};
  document.getElementById('modal-nombre').textContent = 'Tu Carrito';
  
  document.getElementById('modal-pedido').style.display = 'block';
  document.getElementById('titulo-modal').innerHTML = 'Confirmar Pedido del Carrito 🛒 <button class="btn-vaciar" onclick="vaciarCarrito()">Vaciar carrito</button>';
  
  const subtotal = carrito.reduce((a,b) => a + b.precio, 0);
  const total = subtotal + 2000;
  
  let resumen = '<div id="items-carrito-modal">';
  carrito.forEach(i => {
    resumen += `<p><b>${i.promo}</b><br><small>$${i.precio.toLocaleString('es-AR')}</small></p>`;
  });
  resumen += `</div><p style="text-align:center; margin-top:10px">Subtotal: $${subtotal.toLocaleString('es-AR')}</p>`;
  document.getElementById('resumen-pedido').innerHTML = resumen;
  document.getElementById('texto-envio').innerHTML = 'Envío a domicilio: <b style="color:#25D366">$2.000</b>';
  document.getElementById('opcion-envio-container').innerHTML = '';
  document.getElementById('pedido-total').textContent = '$' + total.toLocaleString('es-AR');
  
  document.getElementById('modal').style.display = 'flex';
}

function abrirPedido(producto, precio) {
  tipoEntrega = 'envio';
  pedidoActual = {tipo: 'individual', producto, precio};
  document.getElementById('modal-nombre').textContent = 'Confirmar Pedido';
  
  document.getElementById('modal-pedido').style.display = 'block';
  document.getElementById('titulo-modal').textContent = 'Confirmar Pedido 📱';
  
  let resumen = `<div style="display:flex; justify-content:space-between; margin:10px 0">
    <b>${producto}</b>
    <span style="color:#25D366; font-weight:bold">$${precio.toLocaleString('es-AR')}</span>
  </div>`;
  
  const opcionesEnvio = `
    <div class="opcion-envio">
      <input type="radio" id="retiro" name="entrega" value="retiro" checked onchange="cambiarTipoEntrega('retiro', ${precio})">
      <label for="retiro">🏪 Retirar<br><small>Sin costo</small></label>
      
      <input type="radio" id="envio" name="entrega" value="envio" onchange="cambiarTipoEntrega('envio', ${precio})">
      <label for="envio">🚚 Envío<br><small>+ $2.000</small></label>
    </div>
  `;
  
  document.getElementById('resumen-pedido').innerHTML = resumen;
  document.getElementById('opcion-envio-container').innerHTML = opcionesEnvio;
  document.getElementById('texto-envio').innerHTML = 'Retiro en local: <b style="color:#25D366">GRATIS</b>';
  document.getElementById('pedido-total').textContent = '$' + precio.toLocaleString('es-AR');
  
  document.getElementById('modal').style.display = 'flex';
}

function cambiarTipoEntrega(tipo, precio) {
  tipoEntrega = tipo;
  if(tipo === 'envio') {
    document.getElementById('texto-envio').innerHTML = 'Envío a domicilio: <b style="color:#25D366">$2.000</b>';
    document.getElementById('pedido-total').textContent = '$' + (precio + 2000).toLocaleString('es-AR');
  } else {
    document.getElementById('texto-envio').innerHTML = 'Retiro en local: <b style="color:#25D366">GRATIS</b>';
    document.getElementById('pedido-total').textContent = '$' + precio.toLocaleString('es-AR');
  }
}

function enviarWhatsApp() {
  const nombre = document.getElementById('pedido-nombre').value;
  const tel = document.getElementById('pedido-tel').value;
  const direccion = document.getElementById('pedido-direccion').value;
  const nota = document.getElementById('pedido-nota').value;
  const metodoPago = document.querySelector('input[name="pago"]:checked').value;
  
  if(!nombre || !tel) {
    alert('Completá nombre y teléfono. Son obligatorios');
    return;
  }
  
  if(tipoEntrega === 'envio' && !direccion) {
    alert('Completá la dirección para el envío');
    return;
  }
  
  let msg = `*NUEVO PEDIDO - ASI ES LA BIRRA*%0A%0A`;
  
  if(pedidoActual.tipo === 'carrito') {
    msg += `*Pedido desde CARRITO*%0A*Modalidad: ${tipoEntrega === 'envio' ? 'ENVÍO' : 'RETIRO'}*%0A%0A`;
    carrito.forEach(i => msg += `• ${i.promo} $${i.precio.toLocaleString('es-AR')}%0A`);
    const subtotal = carrito.reduce((a,b) => a + b.precio, 0);
    const total = tipoEntrega === 'envio' ? subtotal + 2000 : subtotal;
    if(tipoEntrega === 'envio') msg += `%0ASubtotal: $${subtotal.toLocaleString('es-AR')}%0AEnvío: $2.000%0A`;
    msg += `*TOTAL: $${total.toLocaleString('es-AR')}*%0A%0A`;
    msg += `*Nombre:* ${nombre}%0A*Tel:* ${tel}%0A*Dirección:* ${direccion}%0A*Nota:* ${nota}%0A*Pago:* ${metodoPago}`;
    carrito = [];
    guardarCarrito();
    actualizarContadorCarrito();
  } else {
    const total = tipoEntrega === 'envio' ? pedidoActual.precio + 2000 : pedidoActual.precio;
    msg += `*Promo:* ${pedidoActual.producto}%0A*Precio:* $${pedidoActual.precio.toLocaleString('es-AR')}%0A*Modalidad:* ${tipoEntrega === 'envio' ? 'ENVÍO' : 'RETIRO'}%0A`;
    if(tipoEntrega === 'envio') msg += `Envío: $2.000%0A`;
    msg += `*TOTAL: $${total.toLocaleString('es-AR')}*%0A%0A`;
    msg += `*Nombre:* ${nombre}%0A*Tel:* ${tel}%0A*Dirección:* ${direccion}%0A*Nota:* ${nota}%0A*Pago:* ${metodoPago}`;
  }
  
  window.open(`https://wa.me/${NUMERO}?text=${msg}`, '_blank');
  cerrarModal();
}

function cerrarModal() {
  document.getElementById('modal').style.display = 'none';
  document.getElementById('pedido-nombre').value = '';
  document.getElementById('pedido-tel').value = '';
  document.getElementById('pedido-direccion').value = '';
  document.getElementById('pedido-nota').value = '';
  document.getElementById('opcion-envio-container').innerHTML = '';
}

function filtrarCategoria(categoria, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  
  const secciones = document.querySelectorAll('.grid-promos');
  const titulos = document.querySelectorAll('.seccion-titulo');
  
  if(categoria === 'todos') {
    secciones.forEach(s => s.style.display = 'grid');
    titulos.forEach(t => t.style.display = 'block');
  } else {
    secciones.forEach(s => {
      s.style.display = s.dataset.categoria === categoria ? 'grid' : 'none';
    });
    titulos.forEach(t => {
      t.style.display = t.id === categoria ? 'block' : 'none';
    });
  }
}
</script>
</html>
